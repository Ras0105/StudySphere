<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/style.css">
    <title>Forgot Password</title>
</head>
<body>
    <div id="forgot-page">
        <div id="forgot-card">

            <a href="/" id="forgot-logo">University Name</a>
            <h1>Forgot Password</h1>
            <p id="forgot-subtext">Enter your email and we'll send you a one-time code</p>

            <div id="status"></div>

            <form id="email-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="name@university.edu" required>
                    </div>
                </div>
                <button type="submit" id="send-btn" class="btn-primary">Send OTP</button>
            </form>

            <div id="otp-section">
                <div class="form-group">
                    <label for="otp">Enter OTP</label>
                    <div class="input-wrapper">
                        <input type="text" id="otp" maxlength="6" inputmode="numeric" placeholder="------" disabled>
                    </div>
                </div>
                <button type="button" id="verify-btn" class="btn-primary" disabled>Verify OTP</button>
            </div>

            <p id="forgot-footer-link">
                <a href="/login">Back to Login</a>
            </p>

        </div>
    </div>

    <script src="/static/js/forget_password.js"></script>
</body>
</html>
