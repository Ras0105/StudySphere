<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/css/style.css">
    <title>Reset Password</title>
</head>
<body>
    <div id="forgot-page">
        <div id="forgot-card">

            <a href="/" id="forgot-logo">University Name</a>
            <h1>Reset Password</h1>
            <p id="forgot-subtext">Choose a new password for your account</p>

            {% if error %}<div class="error-message show">{{ error }}</div>{% endif %}
            {% if success %}<div class="success-message show">{{ success }}</div>{% endif %}

            <form action="/login/forgot-password/change-password" method="POST" autocomplete="off">
                <div class="form-group">
                    <label for="username-display">Resetting password for</label>
                    <div class="input-wrapper">
                        <input type="email" id="username-display" name="username" value="{{ reset_email }}" readonly autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="new_password" name="new_password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary">Save Changes</button>
            </form>

            <p id="forgot-footer-link">
                <a href="/login">Back to Login</a>
            </p>

        </div>
    </div>
</body>
</html>
